name: Deploy CHEEZE

on:
  push:
    branches: [main]

jobs:
  deploy-gateway:
    name: Gateway (Linux LXC)
    runs-on: [self-hosted, gateway]
    steps:
      - name: Pull & deploy
        run: |
          set -euo pipefail
          export HOME=/root
          git config --global --add safe.directory /var/www/home
          cd /var/www/home

          git fetch origin main
          CHANGED=$(git diff --name-only HEAD origin/main)
          echo "=== Changed files ==="
          echo "${CHANGED:-없음}"
          echo "====================="

          git pull origin main

          if echo "$CHANGED" | grep -q "^deploy/gateway/cheeze-portal-api\.py$"; then
            cp deploy/gateway/cheeze-portal-api.py /opt/cheeze-control/cheeze-portal-api.py
            systemctl restart cheeze-portal-api
            echo "✓ cheeze-portal-api restarted"
          fi

          if echo "$CHANGED" | grep -q "^deploy/gateway/cheeze-control-api\.py$"; then
            cp deploy/gateway/cheeze-control-api.py /opt/cheeze-control/cheeze-control-api.py
            systemctl restart cheeze-control-api
            echo "✓ cheeze-control-api restarted"
          fi

          if echo "$CHANGED" | grep -q "^deploy/gateway/cheeze-ai-queue\.py$"; then
            cp deploy/gateway/cheeze-ai-queue.py /opt/cheeze-ai/cheeze-ai-queue.py
            systemctl restart cheeze-ai-queue
            echo "✓ cheeze-ai-queue restarted"
          fi

          if echo "$CHANGED" | grep -q "^deploy/discord-bot/cheeze-discord-bot\.py$"; then
            cp deploy/discord-bot/cheeze-discord-bot.py /opt/cheeze-bot/cheeze-discord-bot.py
            systemctl restart cheeze-discord-bot
            echo "✓ cheeze-discord-bot restarted"
          fi

          echo "Gateway deploy complete."

  deploy-homepc:
    name: Homepc (Windows)
    runs-on: [self-hosted, homepc]
    steps:
      - name: Pull & deploy
        shell: powershell
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          git config --global --add safe.directory D:/Project
          Set-Location D:\Project

          git fetch origin main
          git pull origin main

          # Scheduled task runs D:\Project\deploy\backend\cheeze-backend-agent.py directly
          # No copy needed — just restart when the source file changes
          $src = "deploy\backend\cheeze-backend-agent.py"
          $srcHash = (Get-FileHash $src -Algorithm MD5).Hash
          $agentHashFile = "D:\Project\deploy\backend\.agent-deployed-hash"
          $deployedHash = if (Test-Path $agentHashFile) { Get-Content $agentHashFile -Raw } else { "" }

          if ($srcHash.Trim() -ne $deployedHash.Trim()) {
            Write-Host "Backend agent changed, redeploying..."
            Stop-ScheduledTask -TaskName "CHEEZE Backend Agent" -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 2
            $pid5010 = (Get-NetTCPConnection -LocalPort 5010 -ErrorAction SilentlyContinue).OwningProcess | Select-Object -First 1
            if ($pid5010) {
              Stop-Process -Id $pid5010 -Force -ErrorAction SilentlyContinue
              Write-Host "Killed process $pid5010 on port 5010"
              Start-Sleep -Seconds 2
            }
            Start-Process -FilePath "C:\Program Files\Python312\python.EXE" `
              -ArgumentList "D:\Project\deploy\backend\cheeze-backend-agent.py" `
              -WindowStyle Hidden
            Set-Content $agentHashFile $srcHash
            Write-Host "✓ CHEEZE Backend Agent restarted"
          } else {
            Write-Host "Backend agent unchanged, skipping restart."
          }

          Write-Host "Homepc deploy complete."
