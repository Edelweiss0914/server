name: Deploy CHEEZE

on:
  push:
    branches: [main]

jobs:
  deploy-gateway:
    name: Gateway (Linux LXC)
    runs-on: [self-hosted, gateway]
    steps:
      - name: Pull & deploy
        run: |
          set -euo pipefail
          export HOME=/root
          COMPOSE_FILE=/var/www/home/deploy/docker/docker-compose.yml
          git config --global --add safe.directory /var/www/home
          cd /var/www/home

          git fetch origin main
          CHANGED=$(git diff --name-only HEAD origin/main)
          echo "=== Changed files ==="
          echo "${CHANGED:-없음}"
          echo "====================="

          git stash
          git pull origin main

          # Legacy native Python/Next.js services must remain disabled.
          for svc in cheeze-portal-api cheeze-control-api cheeze-ai-queue cheeze-nextjs; do
            if systemctl list-unit-files "${svc}.service" >/dev/null 2>&1; then
              systemctl stop "$svc" || true
              systemctl disable "$svc" || true
            fi
          done

          # ── Docker Compose 서비스 ─────────────────────────────────────
          if echo "$CHANGED" | grep -qE "^deploy/gateway/cheeze-portal-api\.py$|^deploy/docker/(portal-api/Dockerfile|Dockerfile\.portal-api)$"; then
            docker compose -f "$COMPOSE_FILE" build portal-api
            docker compose -f "$COMPOSE_FILE" up -d --no-deps portal-api
            echo "✓ portal-api rebuilt & restarted"
          fi

          if echo "$CHANGED" | grep -qE "^deploy/gateway/cheeze-control-api\.py$|^deploy/docker/(control-api/Dockerfile|Dockerfile\.control-api)$"; then
            docker compose -f "$COMPOSE_FILE" build control-api
            docker compose -f "$COMPOSE_FILE" up -d --no-deps control-api
            echo "✓ control-api rebuilt & restarted"
          fi

          if echo "$CHANGED" | grep -qE "^deploy/gateway/cheeze-ai-queue\.py$|^deploy/docker/(ai-queue/Dockerfile|Dockerfile\.ai-queue)$"; then
            docker compose -f "$COMPOSE_FILE" build ai-queue
            docker compose -f "$COMPOSE_FILE" up -d --no-deps ai-queue
            echo "✓ ai-queue rebuilt & restarted"
          fi

          if echo "$CHANGED" | grep -qE "^web/"; then
            docker compose -f "$COMPOSE_FILE" build web
            docker compose -f "$COMPOSE_FILE" up -d --no-deps web
            echo "✓ web rebuilt & restarted"
          fi

          # ── Nginx 설정 변경 시 reload (compose.yml 변경 시 재생성) ──
          if echo "$CHANGED" | grep -qE "^deploy/docker/nginx/|^deploy/docker/docker-compose\.yml$"; then
            docker compose -f "$COMPOSE_FILE" up -d --no-deps nginx
            echo "✓ nginx recreated/updated"
          fi

          # ── Discord 봇 (여전히 systemd) ──────────────────────────────
          if echo "$CHANGED" | grep -q "^deploy/discord-bot/cheeze-discord-bot\.py$"; then
            cp deploy/discord-bot/cheeze-discord-bot.py /opt/cheeze-bot/cheeze-discord-bot.py
            systemctl restart cheeze-discord-bot
            echo "✓ cheeze-discord-bot restarted"
          fi

          echo "Gateway deploy complete."

  deploy-homepc:
    name: Homepc (Windows)
    runs-on: [self-hosted, homepc]
    steps:
      - name: Pull & deploy
        shell: powershell
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          git config --global --add safe.directory D:/Project
          Set-Location D:\Project

          git fetch origin main
          git pull origin main

          # Copy backend agent to its running location.
          # The agent watches its own file hash and self-restarts within one watchdog
          # interval (~60s) when the script changes. No external process control needed.
          $src     = "deploy\backend\cheeze-backend-agent.py"
          $dst     = "D:\Servers\Control\backend-agent\cheeze-backend-agent.py"
          $workDir = Split-Path $dst

          if (-not (Test-Path $workDir)) { New-Item -ItemType Directory -Path $workDir -Force | Out-Null }
          Copy-Item $src $dst -Force
          Copy-Item "deploy\backend\restart-loop.ps1" (Join-Path $workDir "restart-loop.ps1") -Force
          $srcHash = (Get-FileHash $dst -Algorithm MD5).Hash
          Write-Host "Backend agent deployed to $dst (hash: $($srcHash.Substring(0,8))). Agent will self-restart if changed."

          # ── Scheduled Task: AtStartup + hibernate/sleep resume (EventID 107) ──
          # The task runs restart-loop.ps1 instead of python directly.
          # restart-loop.ps1 loops forever and restarts the agent within 5 s on any
          # exit (crash, external kill, self-update). Combined with the EventID=107
          # trigger, the agent recovers from both process death and hibernate resume.
          $TaskName   = "CHEEZE Backend Agent"
          $loopScript = Join-Path $workDir "restart-loop.ps1"
          $Action     = New-ScheduledTaskAction `
              -Execute "powershell" `
              -Argument "-NonInteractive -WindowStyle Hidden -ExecutionPolicy Bypass -File `"$loopScript`"" `
              -WorkingDirectory $workDir
          $Startup  = New-ScheduledTaskTrigger -AtStartup
          $Settings = New-ScheduledTaskSettingsSet `
              -AllowStartIfOnBatteries `
              -DontStopIfGoingOnBatteries `
              -StartWhenAvailable `
              -ExecutionTimeLimit 0 `
              -RestartCount 10 `
              -RestartInterval (New-TimeSpan -Minutes 1)

          # Only register if the task does not already exist (requires admin).
          $existingTask = Get-ScheduledTask -TaskName $TaskName -ErrorAction SilentlyContinue
          if (-not $existingTask) {
              try {
                  Register-ScheduledTask -TaskName $TaskName -Action $Action -Trigger $Startup `
                      -Settings $Settings -User "SYSTEM" -RunLevel Highest -Force | Out-Null

                  $taskXml = Export-ScheduledTask -TaskName $TaskName
                  if ($taskXml -notmatch 'EventID=107') {
                      $sub = '&lt;QueryList&gt;&lt;Query Id="0" Path="System"&gt;&lt;Select Path="System"&gt;*[System[Provider[@Name=''Microsoft-Windows-Kernel-Power''] and (EventID=107)]]&lt;/Select&gt;&lt;/Query&gt;&lt;/QueryList&gt;'
                      $resumeTrigger = "<EventTrigger><Enabled>true</Enabled><Subscription>$sub</Subscription></EventTrigger>"
                      $taskXml = $taskXml.Replace('</Triggers>', "$resumeTrigger</Triggers>")
                      Register-ScheduledTask -TaskName $TaskName -Xml $taskXml -Force | Out-Null
                      Write-Host "Hibernate/sleep resume trigger (EventID=107) added to scheduled task."
                  }
                  Write-Host "Scheduled task registered: '$TaskName'"
              } catch {
                  Write-Host "WARNING: Could not register scheduled task (requires admin). Skipping."
              }
          } else {
              Write-Host "Scheduled task '$TaskName' already exists — skipping registration."
          }

          # ── Ensure the agent process is currently running ─────────────────
          $listening = netstat -ano | Select-String ":5010\s.*LISTENING"
          if ($listening) {
              Write-Host "Backend agent already listening on :5010 — self-restart will handle the update."
          } else {
              Write-Host "Port 5010 not listening — starting scheduled task."
              Start-ScheduledTask -TaskName $TaskName
              Start-Sleep -Seconds 5
              $check = netstat -ano | Select-String ":5010\s.*LISTENING"
              if ($check) {
                  Write-Host "Backend agent started successfully."
              } else {
                  Write-Host "WARNING: Backend agent may not have started — check $workDir\agent.log"
              }
          }

          Write-Host "Homepc deploy complete."
