# Paper help overrides for GriefPrevention

amended-topics:
  /claim:
    shortText: 현재 위치를 기준으로 땅을 클레임합니다.
    fullText: |
      /claim <반지름>
      현재 위치를 기준으로 일정 반경의 땅을 클레임합니다.
      기본적인 보호 구역 생성에 사용합니다.
  /abandonclaim:
    shortText: 현재 서 있는 클레임을 포기합니다.
    fullText: |
      /abandonclaim
      현재 서 있는 클레임을 포기합니다.
      사용한 클레임 블록은 다시 반환됩니다.
  /abandontoplevelclaim:
    shortText: 현재 최상위 클레임과 모든 하위 구역을 포기합니다.
    fullText: |
      /abandontoplevelclaim
      현재 최상위 클레임과 그 안의 모든 하위 구역을 함께 삭제합니다.
  /abandonallclaims:
    shortText: 자신의 모든 클레임을 포기합니다.
    fullText: |
      /abandonallclaims
      자신의 모든 클레임을 한 번에 포기합니다.
      확인이 필요할 수 있습니다.
  /trust:
    shortText: 플레이어에게 건축 권한을 부여합니다.
    fullText: |
      /trust <플레이어>
      해당 플레이어에게 현재 클레임에서 건축 권한을 부여합니다.
      컨테이너, 출입, 권한 위임보다 높은 기본 공유 권한입니다.
  /untrust:
    shortText: 플레이어의 공유 권한을 제거합니다.
    fullText: |
      /untrust <플레이어>
      현재 클레임 또는 전체 클레임에서 해당 플레이어의 권한을 제거합니다.
  /containertrust:
    shortText: 상자, 작물, 동물 사용 권한을 부여합니다.
    fullText: |
      /containertrust <플레이어>
      상자, 작물, 동물, 침대, 버튼, 레버 사용 권한을 부여합니다.
  /accesstrust:
    shortText: 출입 및 기본 상호작용 권한을 부여합니다.
    fullText: |
      /accesstrust <플레이어>
      침대, 버튼, 레버 같은 기본 상호작용 권한을 부여합니다.
  /permissiontrust:
    shortText: 다른 사람에게 권한을 나눠줄 수 있는 권한을 부여합니다.
    fullText: |
      /permissiontrust <플레이어>
      해당 플레이어가 자신의 권한 수준을 다른 사람과 공유할 수 있게 합니다.
  /subdivideclaims:
    shortText: 하위 구역 생성 모드로 전환합니다.
    fullText: |
      /subdivideclaims
      기존 클레임 안에 하위 구역을 만드는 모드로 전환합니다.
  /restrictsubclaim:
    shortText: 하위 구역이 부모 권한을 상속하지 않게 합니다.
    fullText: |
      /restrictsubclaim
      현재 하위 구역이 부모 클레임의 권한을 상속하지 않도록 전환합니다.
  /claimslist:
    shortText: 자신의 클레임과 사용 가능한 블록 수를 확인합니다.
    fullText: |
      /claimslist
      현재 보유한 클레임 수와 남은 클레임 블록 수를 확인합니다.
      관리자 권한이 있으면 다른 플레이어도 조회할 수 있습니다.
  /trapped:
    shortText: 갇혔을 때 주변 안전한 위치로 이동을 시도합니다.
    fullText: |
      /trapped
      다른 사람의 클레임에 갇혔을 때 탈출을 시도합니다.
      상황에 따라 쿨타임이 있을 수 있습니다.
  /ignoreclaims:
    shortText: 관리자용 클레임 무시 모드를 전환합니다.
    fullText: |
      /ignoreclaims
      관리자 권한으로 클레임 제한을 무시하는 모드를 켜거나 끕니다.
  /claimexplosions:
    shortText: 현재 클레임의 폭발 허용 여부를 전환합니다.
    fullText: |
      /claimexplosions
      현재 클레임에서 폭발로 블록이 파괴될 수 있는지 전환합니다.
  /claimbook:
    shortText: 클레임 안내서를 지급합니다.
    fullText: |
      /claimbook <플레이어>
      땅 클레임 사용법이 적힌 안내서를 지급합니다.
  /gpreload:
    shortText: GriefPrevention 설정과 메시지를 다시 불러옵니다.
    fullText: |
      /gpreload
      GriefPrevention의 설정과 메시지 파일을 다시 불러옵니다.
      플러그인 전체 재시작은 아닙니다.
  /adminclaims:
    shortText: 관리자 클레임 모드로 전환합니다.
    fullText: |
      /adminclaims
      무료 관리자 클레임을 만들 수 있는 모드로 전환합니다.
      관리자끼리 공유하는 공용 보호 구역에 적합합니다.
  /restorenature:
    shortText: 자연 복구 모드로 전환합니다.
    fullText: |
      /restorenature
      선택한 영역을 자연 상태에 가깝게 복구하는 모드로 전환합니다.
  /restorenatureaggressive:
    shortText: 강한 자연 복구 모드로 전환합니다.
    fullText: |
      /restorenatureaggressive
      더 공격적으로 지형을 자연 상태로 복구합니다.
      보존할 구조물 근처에서는 주의해서 사용해야 합니다.
  /restorenaturefill:
    shortText: 지정 반경 채우기 모드로 전환합니다.
    fullText: |
      /restorenaturefill <반지름>
      지정한 반경으로 영역을 채우는 복구 모드입니다.
  /basicclaims:
    shortText: 기본 클레임 생성 모드로 돌아갑니다.
    fullText: |
      /basicclaims
      하위 구역, 복구, 관리자 모드 등을 종료하고 기본 클레임 모드로 돌아갑니다.
  /extendclaim:
    shortText: 현재 클레임 경계를 보는 방향으로 확장합니다.
    fullText: |
      /extendclaim <블록 수>
      현재 서 있는 클레임의 경계를 바라보는 방향으로 밀거나 당겨 확장합니다.
  /buyclaimblocks:
    shortText: 서버 화폐로 클레임 블록을 구매합니다.
    fullText: |
      /buyclaimblocks <개수>
      경제 플러그인이 연결된 서버에서 클레임 블록을 구매합니다.
  /sellclaimblocks:
    shortText: 클레임 블록을 판매해 서버 화폐를 받습니다.
    fullText: |
      /sellclaimblocks <개수>
      경제 플러그인이 연결된 서버에서 클레임 블록을 판매합니다.
  /trustlist:
    shortText: 현재 클레임의 권한 목록을 확인합니다.
    fullText: |
      /trustlist
      현재 서 있는 클레임에 누가 어떤 권한을 갖고 있는지 보여줍니다.
  /siege:
    shortText: 다른 플레이어에게 공성을 시작합니다.
    fullText: |
      /siege <플레이어>
      대상 플레이어와 관련된 공성 시스템을 시작합니다.
      서버 설정에 따라 사용 가능 여부가 달라집니다.
  /transferclaim:
    shortText: 관리자 클레임을 개인 클레임으로 이전합니다.
    fullText: |
      /transferclaim <플레이어>
      현재 관리자 클레임을 특정 플레이어의 개인 클레임으로 이전합니다.
  /unlockdrops:
    shortText: 사망 시 드롭한 아이템을 다른 플레이어가 줍게 허용합니다.
    fullText: |
      /unlockdrops
      사망 후 잠긴 드롭 아이템을 다른 플레이어도 주울 수 있게 합니다.
  /softmute:
    shortText: 플레이어를 소프트 뮤트합니다.
    fullText: |
      /softmute <플레이어>
      대상 플레이어의 채팅이 소프트 뮤트된 플레이어끼리만 보이게 합니다.
  /givepet:
    shortText: 길들인 펫을 다른 플레이어에게 넘깁니다.
    fullText: |
      /givepet <플레이어>
      이전 준비 후 펫을 클릭해 소유권을 넘깁니다.
  /gpblockinfo:
    shortText: 블록이나 손에 든 아이템의 기술 정보를 확인합니다.
    fullText: |
      /gpblockinfo
      관리자용 진단 명령으로, 블록 및 아이템의 상세 정보를 확인합니다.
  /ignoreplayer:
    shortText: 특정 플레이어의 채팅을 무시합니다.
    fullText: |
      /ignoreplayer <플레이어>
      해당 플레이어의 채팅을 보지 않도록 설정합니다.
  /unignoreplayer:
    shortText: 특정 플레이어 채팅 무시를 해제합니다.
    fullText: |
      /unignoreplayer <플레이어>
      해당 플레이어의 채팅을 다시 보이게 합니다.
  /ignoredplayerlist:
    shortText: 현재 무시 중인 플레이어 목록을 봅니다.
    fullText: |
      /ignoredplayerlist
      채팅을 무시 중인 플레이어 목록을 확인합니다.
  /separate:
    shortText: 두 플레이어가 서로의 채팅을 못 보게 합니다.
    fullText: |
      /separate <플레이어1> <플레이어2>
      두 플레이어를 상호 무시 상태로 만듭니다.
  /unseparate:
    shortText: 서로 분리된 두 플레이어의 채팅 차단을 해제합니다.
    fullText: |
      /unseparate <플레이어1> <플레이어2>
      /separate 상태를 해제합니다.
  /adjustbonusclaimblocks:
    shortText: 특정 플레이어의 보너스 클레임 블록을 조정합니다.
    fullText: |
      /adjustbonusclaimblocks <플레이어> <수치>
      대상 플레이어의 보너스 클레임 블록을 증가 또는 감소시킵니다.
  /adjustbonusclaimblocksall:
    shortText: 모든 온라인 플레이어의 보너스 블록을 조정합니다.
    fullText: |
      /adjustbonusclaimblocksall <수치>
      현재 접속 중인 모든 플레이어의 보너스 클레임 블록을 조정합니다.
  /setaccruedclaimblocks:
    shortText: 플레이어의 누적 클레임 블록을 직접 설정합니다.
    fullText: |
      /setaccruedclaimblocks <플레이어> <수치>
      대상 플레이어의 누적 클레임 블록 값을 직접 지정합니다.
  /deleteclaim:
    shortText: 현재 클레임을 강제로 삭제합니다.
    fullText: |
      /deleteclaim
      현재 서 있는 클레임을 소유자와 관계없이 삭제합니다.
      관리자 권한이 필요할 수 있습니다.
  /deleteallclaims:
    shortText: 특정 플레이어의 모든 클레임을 삭제합니다.
    fullText: |
      /deleteallclaims <플레이어>
      대상 플레이어의 모든 클레임을 제거합니다.
  /deleteclaimsinworld:
    shortText: 특정 월드의 모든 클레임을 삭제합니다.
    fullText: |
      /deleteclaimsinworld <월드>
      지정한 월드의 모든 클레임을 삭제합니다.
      콘솔에서 사용하는 것이 안전합니다.
  /deleteuserclaimsinworld:
    shortText: 특정 월드의 일반 플레이어 클레임만 삭제합니다.
    fullText: |
      /deleteuserclaimsinworld <월드>
      관리자 클레임을 제외한 일반 클레임만 삭제합니다.
  /deletealladminclaims:
    shortText: 모든 관리자 클레임을 삭제합니다.
    fullText: |
      /deletealladminclaims
      서버의 모든 관리자 클레임을 제거합니다.
  /adminclaimslist:
    shortText: 모든 관리자 클레임 목록을 확인합니다.
    fullText: |
      /adminclaimslist
      현재 존재하는 관리자 클레임 목록을 보여줍니다.
