<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Edelweiss 개인 서버 홈페이지">
  <title>CHEEZE — Home</title>

  <!-- 폰트 (서버 환경에 따라 오프라인 폴백 자동 적용) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css?v=20260413h-index">

  <!-- 파비콘 (인라인 SVG → data URI) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%234f7fff'/%3E%3Ctext y='.9em' x='50%25' text-anchor='middle' font-size='60' dy='10'%3E✿%3C/text%3E%3C/svg%3E">
</head>

<body>

  <!-- ── 상단 바 ─────────────────────────────────── -->
  <div class="top-bar">
    <button id="themeToggle" class="theme-toggle" aria-label="다크 모드로 전환">
      <!-- 태양 아이콘 (다크모드일 때 표시) -->
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="17" height="17"
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           style="display:none" aria-hidden="true">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1"  x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22"   x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1"  y1="12" x2="3"  y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78"  x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
      </svg>
      <!-- 달 아이콘 (라이트모드일 때 표시) -->
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="17" height="17"
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>

  <!-- ── 메인 ───────────────────────────────────── -->
  <main class="container">

    <!-- 브랜드 / 로고 -->
    <header class="brand">
      <div class="brand-logo-wrap">
        <div class="brand-logo-bg"></div>
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"
             aria-label="Edelweiss 로고" role="img">
          <!-- 에델바이스 꽃 형태 로고 -->
          <!-- 중앙 원 -->
          <circle cx="50" cy="50" r="11" fill="#4f7fff"/>
          <!-- 6개 꽃잎 -->
          <ellipse cx="50"    cy="24"    rx="7" ry="13" fill="#a0b8ff" opacity="0.85"/>
          <ellipse cx="50"    cy="76"    rx="7" ry="13" fill="#a0b8ff" opacity="0.85"
                   transform="rotate(180 50 50)"/>
          <ellipse cx="50"    cy="24"    rx="7" ry="13" fill="#a0b8ff" opacity="0.85"
                   transform="rotate(60 50 50)"/>
          <ellipse cx="50"    cy="24"    rx="7" ry="13" fill="#a0b8ff" opacity="0.85"
                   transform="rotate(120 50 50)"/>
          <ellipse cx="50"    cy="24"    rx="7" ry="13" fill="#a0b8ff" opacity="0.85"
                   transform="rotate(240 50 50)"/>
          <ellipse cx="50"    cy="24"    rx="7" ry="13" fill="#a0b8ff" opacity="0.85"
                   transform="rotate(300 50 50)"/>
          <!-- 중앙 원 (위에 다시 그려서 꽃잎 위에 표시) -->
          <circle cx="50" cy="50" r="13" fill="#4f7fff"/>
          <circle cx="50" cy="50" r="7"  fill="white" opacity="0.9"/>
        </svg>
      </div>
      <div class="brand-wordmark">
        <h1 class="brand-name">CHEEZE</h1>
        <p class="brand-sub">개인 서버 홈</p>
      </div>
    </header>

    <!-- Ollama AI 상태 칩 -->
    <div id="ollamaStatus" class="ollama-status-strip" hidden></div>

    <!-- 검색창 -->
    <div class="search-section">
      <div class="search-bar" id="searchBar" role="search">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>

        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="서비스 검색...  (예: 클라우드, nextcloud)"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          aria-label="서비스 검색"
        >

        <button class="clear-btn" id="clearBtn" aria-label="검색어 지우기" tabindex="-1">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15"
               viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6"  y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <p class="search-hint" id="searchHint">
        <kbd>Enter</kbd> 첫 번째 결과로 이동 &nbsp;·&nbsp;
        <kbd>/</kbd> 검색창 포커스 &nbsp;·&nbsp;
        <kbd>Esc</kbd> 초기화
      </p>
    </div>

    <!-- 빠른 접근 -->
    <section class="quick-access" id="quickAccess" aria-label="빠른 접근">
      <p class="section-label">서비스</p>
      <div class="quick-grid" id="quickGrid">
        <!-- app.js 에서 동적 생성 -->
      </div>
    </section>

    <!-- 검색 결과 -->
    <section class="results-section" id="resultsSection"
             style="display:none" aria-label="검색 결과" aria-live="polite">
      <div class="results-header">
        <span id="resultsCount"></span>
      </div>
      <div class="results-grid" id="resultsGrid">
        <!-- app.js 에서 동적 생성 -->
      </div>
    </section>

  </main>

  <!-- ── 푸터 ────────────────────────────────────── -->
  <footer class="footer">
    <span>edelweiss0297.cloud</span>
    &nbsp;·&nbsp;
    <span>Proxmox &amp; Cloudflare</span>
  </footer>

  <!-- 스크립트 -->
  <script src="js/services.js?v=20260413e-index"></script>
  <script src="js/app.js?v=20260413h-index"></script>

  <!-- ── 토큰 입력 모달 ────────────────────────────────── -->
  <dialog class="token-dialog" id="tokenDialog" aria-modal="true" aria-labelledby="tokenDialogTitle">
    <div class="token-dialog-header">
      <div class="token-dialog-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div class="token-dialog-title-group">
        <h2 class="token-dialog-title" id="tokenDialogTitle">제어 토큰 확인</h2>
        <p class="token-dialog-sub" id="tokenDialogSub"></p>
      </div>
    </div>

    <div class="token-dialog-body">
      <div class="token-input-wrap">
        <input
          type="password"
          class="token-input"
          id="tokenInput"
          placeholder="토큰을 입력하세요"
          autocomplete="current-password"
          aria-label="제어 토큰"
        >
        <button
          type="button"
          class="token-eye-btn"
          id="tokenEyeBtn"
          aria-label="토큰 표시/숨김"
          tabindex="-1"
        >
          <!-- eye 아이콘 (기본: 숨김 상태) -->
          <svg class="eye-off" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
               viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
          <svg class="eye-on" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
               viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true" style="display:none">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="token-dialog-footer">
      <button type="button" class="control-btn" id="tokenCancelBtn">취소</button>
      <button type="button" class="control-btn is-primary" id="tokenConfirmBtn">확인</button>
    </div>
  </dialog>

</body>
</html>
