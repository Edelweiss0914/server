services:
  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
    container_name: cheeze-web
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - CONTROL_API_URL=${CONTROL_API_URL:-http://portal-api:11437}
      - ADMIN_CONTROL_TOKEN=${ADMIN_CONTROL_TOKEN}
      - SERVER_RENTAL_WEBHOOK_URL=${SERVER_RENTAL_WEBHOOK_URL:-}
      - SERVER_RENTAL_WEBHOOK_USERNAME=${SERVER_RENTAL_WEBHOOK_USERNAME:-CHEEZE Rental Intake}
      - PTERODACTYL_PANEL_URL=${PTERODACTYL_PANEL_URL:-https://panel.edelweiss0297.cloud}
      - PTERODACTYL_PANEL_INTERNAL_URL=${PTERODACTYL_PANEL_INTERNAL_URL:-http://pterodactyl-panel}
      - PTERODACTYL_APPLICATION_API_KEY=${PTERODACTYL_APPLICATION_API_KEY:-}
    depends_on:
      portal-api:
        condition: service_healthy
      pterodactyl-panel:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - cheeze-net

  nginx:
    image: nginx:alpine
    container_name: cheeze-nginx
    network_mode: host
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      web:
        condition: service_healthy
      portal-api:
        condition: service_healthy
      control-api:
        condition: service_healthy
      ai-queue:
        condition: service_healthy
      pterodactyl-panel:
        condition: service_started
    restart: unless-stopped

  portal-api:
    build:
      context: ../../deploy/gateway
      dockerfile: ../../deploy/docker/portal-api/Dockerfile
    container_name: cheeze-portal-api
    ports:
      - "127.0.0.1:11437:11437"
    env_file:
      - .env
    environment:
      - CHEEZE_PORTAL_LISTEN_HOST=0.0.0.0
      - CHEEZE_PORTAL_LISTEN_PORT=11437
      - CHEEZE_INTERNAL_CONTROL_BASE=http://control-api:11436
    depends_on:
      control-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:11437/healthz', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - /opt/cheeze-control:/opt/cheeze-control
    restart: unless-stopped
    networks:
      - cheeze-net

  control-api:
    build:
      context: ../../deploy/gateway
      dockerfile: ../../deploy/docker/control-api/Dockerfile
    container_name: cheeze-control-api
    ports:
      - "127.0.0.1:11436:11436"
    env_file:
      - .env
    environment:
      - CHEEZE_CONTROL_LISTEN_HOST=0.0.0.0
      - CHEEZE_CONTROL_LISTEN_PORT=11436
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import os,urllib.request; req=urllib.request.Request('http://127.0.0.1:11436/healthz', headers={'X-Cheeze-Internal-Token': os.environ.get('CHEEZE_INTERNAL_SECRET', '')}); urllib.request.urlopen(req, timeout=2)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - cheeze-net

  ai-queue:
    build:
      context: ../../deploy/gateway
      dockerfile: ../../deploy/docker/ai-queue/Dockerfile
    container_name: cheeze-ai-queue
    ports:
      - "127.0.0.1:11435:11435"
    env_file:
      - .env
    environment:
      - CHEEZE_AI_LISTEN_HOST=0.0.0.0
      - CHEEZE_AI_LISTEN_PORT=11435
    depends_on:
      control-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:11435/healthz', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - cheeze-net

  # ── Pterodactyl Panel ───────────────────────────────────────────────
  pterodactyl-db:
    image: mariadb:10.11
    container_name: pterodactyl-db
    command: --skip-ssl
    env_file: .env
    environment:
      - MYSQL_ROOT_PASSWORD=${PTERO_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${PTERO_DB_DATABASE:-panel}
      - MYSQL_USER=${PTERO_DB_USER:-pterodactyl}
      - MYSQL_PASSWORD=${PTERO_DB_PASSWORD}
    volumes:
      - pterodactyl-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - cheeze-net

  pterodactyl-cache:
    image: redis:alpine
    container_name: pterodactyl-cache
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - cheeze-net

  pterodactyl-panel:
    image: ghcr.io/pterodactyl/panel:latest
    container_name: pterodactyl-panel
    ports:
      - "127.0.0.1:8080:80"
    env_file: .env
    environment:
      - APP_URL=https://panel.edelweiss0297.cloud
      - APP_TIMEZONE=Asia/Seoul
      - DB_HOST=pterodactyl-db
      - DB_PORT=3306
      - DB_DATABASE=${PTERO_DB_DATABASE:-panel}
      - DB_USERNAME=${PTERO_DB_USER:-pterodactyl}
      - DB_PASSWORD=${PTERO_DB_PASSWORD}
      - DB_USE_SSL=false
      - REDIS_HOST=pterodactyl-cache
      - REDIS_PORT=6379
      - TRUSTED_PROXIES=172.16.0.0/12
      - APP_KEY=${PTERO_APP_KEY}
    volumes:
      - pterodactyl-data:/app/var
      - pterodactyl-logs:/app/storage/logs
      - ./pterodactyl-panel/.my.cnf:/root/.my.cnf:ro
    depends_on:
      pterodactyl-db:
        condition: service_healthy
      pterodactyl-cache:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cheeze-net

  # cloudflared runs as native systemd service (no cert.pem needed with credentials file)
  # Config: /etc/cloudflared/config.yml  ingress → http://localhost:80 (Docker nginx)

networks:
  cheeze-net:
    driver: bridge

volumes:
  pterodactyl-db:
  pterodactyl-data:
  pterodactyl-logs:
