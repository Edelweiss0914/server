# CHEEZE Gateway — Docker Compose Nginx configuration
# nginx runs in host network mode; backends exposed on 127.0.0.1

# Rate limit zones
map $request_method $cheeze_action_key {
    POST    $binary_remote_addr;
    default "";
}
limit_req_zone $binary_remote_addr  zone=cheeze_control_status:10m rate=30r/m;
limit_req_zone $cheeze_action_key   zone=cheeze_control_action:10m rate=5r/m;

# ── Public site ──────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Control API (Portal facade) — matched before / catch-all
    location /api/control/ {
        limit_req zone=cheeze_control_status burst=10 nodelay;
        limit_req zone=cheeze_control_action burst=3  nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:11437/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 10s;
        proxy_send_timeout 210s;
        proxy_read_timeout 210s;
    }

    # AI Queue
    location /ai/ {
        proxy_pass http://127.0.0.1:11435/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 5s;
        proxy_send_timeout 190s;
        proxy_read_timeout 190s;

        proxy_buffering off;
        chunked_transfer_encoding on;
    }

    # Next.js — handles /, /servers, /admin, /api/admin/*, /_next/*
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        proxy_pass_header CF_Authorization;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# ── Cloud VM 서비스 라우팅 ────────────────────────────────────────────
# Cloud VM: 10.0.0.10 (vmbr1 NAT, Proxmox 내부 브리지)

# Nextcloud
server {
    listen 80;
    listen [::]:80;
    server_name cloud.edelweiss0297.cloud;

    client_max_body_size 10G;

    location /a8x9k2-admin {
        allow 100.64.0.0/10;  # Tailscale CGNAT 대역
        deny all;
        proxy_pass http://10.0.0.10:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /admin {
        deny all;
    }

    location / {
        proxy_pass http://10.0.0.10:80;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }
}

