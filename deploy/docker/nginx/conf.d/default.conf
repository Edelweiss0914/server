# CHEEZE Gateway — Docker Compose Nginx configuration
# Upstream references use Docker service names instead of 127.0.0.1

# Rate limit zones
map $request_method $cheeze_action_key {
    POST    $binary_remote_addr;
    default "";
}
limit_req_zone $binary_remote_addr  zone=cheeze_control_status:10m rate=30r/m;
limit_req_zone $cheeze_action_key   zone=cheeze_control_action:10m rate=5r/m;

# ── Public site ──────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/home;
    index index.html;

    # Static files (legacy — until Next.js migration complete)
    location / {
        try_files $uri $uri/ =404;
    }

    # Phase 2: uncomment after Next.js migration
    # location / {
    #     proxy_pass http://web:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # Control API (Portal facade)
    location /api/control/ {
        limit_req zone=cheeze_control_status burst=10 nodelay;
        limit_req zone=cheeze_control_action burst=3  nodelay;
        limit_req_status 429;

        proxy_pass http://portal-api:11437/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 10s;
        proxy_send_timeout 210s;
        proxy_read_timeout 210s;
    }

    # AI Queue
    location /ai/ {
        proxy_pass http://ai-queue:11435/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 5s;
        proxy_send_timeout 190s;
        proxy_read_timeout 190s;

        proxy_buffering off;
        chunked_transfer_encoding on;
    }
}

# ── Tailscale-only admin ─────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;

    server_name gateway-lxc 100.75.209.83;

    root /var/www/home;
    index admin.html;

    location = /admin.html {
        try_files /admin.html =404;
    }

    location /api/control/admin/ {
        proxy_pass http://portal-api:11437/admin/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Admin also needs control API for start/stop/console
    location /api/control/ {
        proxy_pass http://portal-api:11437/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;

        proxy_connect_timeout 10s;
        proxy_send_timeout 210s;
        proxy_read_timeout 210s;
    }
}
